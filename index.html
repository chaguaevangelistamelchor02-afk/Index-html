<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para ti ❤️</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
    font-family:Arial;
    overflow:hidden;
}

/* FONDO DETRÁS */
#fondo{
    position:fixed;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
}

/* CONTENIDO */
.contenedor{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    z-index:2;
    width:100%;
}

/* MEDIA */
img,video{
    display:block;
    margin:0 auto;
    width:300px;
    border-radius:20px;
    box-shadow:0 0 25px pink;
}

/* BOTONES */
button{
    margin:10px;
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
}

/* CORAZONES LENTOS 🐢 */
.heart{
    position:absolute;
    color:red;
    animation: flotar 18s linear infinite;
}

@keyframes flotar{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh); opacity:0;}
}

/* TEXTO LENTO 🐢 */
.feliz{
    position:absolute;
    color:pink;
    font-size:16px;
    animation: flotarTexto 22s linear infinite;
}

@keyframes flotarTexto{
    0%{transform:translateY(100vh);}
    100%{transform:translateY(-10vh); opacity:0;}
}

/* FINAL MUY LENTO */
.final-text{
    position:fixed;
    top:100%;
    width:100%;
    font-size:22px;
    animation: subir 18s linear forwards;
}

@keyframes subir{
    from{top:100%;}
    to{top:25%;}
}

#juego{display:none;}
#final{display:none;}
</style>
</head>

<body>

<div id="fondo"></div>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<div id="inicio" style="margin-top:40%; position:relative; z-index:2;">
<h2>¿Quieres escuchar nuestra canción? ❤️</h2>
<button onclick="iniciar(true)">Sí ❤️</button>
<button onclick="iniciar(false)">No 💔</button>
</div>

<div class="contenedor" id="juego">
<h2 id="titulo"></h2>

<img id="img" style="display:none;">
<video id="video" controls style="display:none;"></video>

<h1 id="emojiVideo"></h1>

<p id="texto"></p>

<p>¿Te está gustando mi amor? ❤️</p>
<button onclick="respuesta(true)">Sí 😍</button>
<button onclick="respuesta(false)">No 💔</button>
</div>

<div id="final"></div>

<script>

// ❤️ CORAZONES MUY LENTOS
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"%";
    h.style.fontSize=(10+Math.random()*20)+"px";
    document.getElementById("fondo").appendChild(h);
    setTimeout(()=>h.remove(),18000);
},1200);

// 💖 TEXTO MUY LENTO
setInterval(()=>{
    let t=document.createElement("div");
    t.className="feliz";
    t.innerHTML="💖 Feliz aniversario 💖";
    t.style.left=Math.random()*100+"%";
    document.getElementById("fondo").appendChild(t);
    setTimeout(()=>t.remove(),22000);
},3000);


// HISTORIA CON TÍTULOS ÚNICOS
let paso=0;

let historia=[

{tipo:"img", titulo:"1. El inicio de nuestro amor ❤️", texto:"Aquí comenzó todo 💕", src:"imagenes1.jpg"},
{tipo:"img", titulo:"2. Donde todo cambió 💖", texto:"Tu llegada lo cambió todo 🥺", src:"imagenes2.jpg"},
{tipo:"img", titulo:"3. Mi razón de sonreír 😊", texto:"Eres mi felicidad 💕", src:"imagenes3.jpg"},
{tipo:"img", titulo:"4. Contigo en paz 🥹", texto:"Mi lugar seguro ❤️", src:"imagenes4.jpg"},
{tipo:"img", titulo:"5. Amor verdadero 💞", texto:"Lo nuestro es único 😘", src:"imagenes5.jpg"},
{tipo:"img", titulo:"6. Momentos felices 😍", texto:"Amo cada instante ❤️", src:"imagenes6.jpg"},
{tipo:"img", titulo:"7. Recuerdos inolvidables 💭", texto:"Siempre en mi corazón 💕", src:"imagenes7.jpg"},
{tipo:"img", titulo:"8. Mi lugar favorito 🌍", texto:"Donde estás tú ❤️", src:"imagenes8.jpg"},
{tipo:"img", titulo:"9. Siempre juntos 🥰", texto:"A tu lado todo es mejor 💖", src:"imagenes9.jpg"},
{tipo:"img", titulo:"10. Amor infinito 💘", texto:"Cada día te amo más 😍", src:"imagenes10.jpg"},
{tipo:"img", titulo:"11. Mi vida entera 💕", texto:"Eres todo para mí ❤️", src:"imagenes11.jpg"},
{tipo:"img", titulo:"12. Sueños contigo 🥹", texto:"Quiero todo contigo 💖", src:"imagenes12.jpg"},
{tipo:"img", titulo:"13. Nuestro destino 🌟", texto:"Siempre juntos ❤️", src:"imagenes13.jpg"},
{tipo:"img", titulo:"14. Tu sonrisa 😄", texto:"Mi mayor alegría 💕", src:"imagenes14.jpg"},
{tipo:"img", titulo:"15. Mi universo 🌍", texto:"Eres mi todo ❤️", src:"imagenes15.jpg"},
{tipo:"img", titulo:"16. Amor eterno 💞", texto:"Te amo sin fin 💖", src:"imagenes16.jpg"},

{tipo:"video", titulo:"17. Un recuerdo que guardo 🎥", texto:"Mira esto mi amor ❤️", src:"Video17.mp4"},
{tipo:"video", titulo:"18. Un momento inolvidable 🎬", texto:"Nunca olvidaré esto 💕", src:"Video18.mp4"},
{tipo:"video", titulo:"19. Nuestro amor para siempre ❤️", texto:"Esto es solo el comienzo 🥹", src:"Video19.mp4"}
];

// CARGAR
function cargar(){
    let data=historia[paso];

    let img=document.getElementById("img");
    let video=document.getElementById("video");
    let musica=document.getElementById("musica");
    let emoji=document.getElementById("emojiVideo");

    document.getElementById("titulo").innerText=data.titulo;
    document.getElementById("texto").innerText=data.texto;

    if(data.tipo === "img"){
        img.style.display = "block";
        video.style.display = "none";
        emoji.innerText = "";
        img.src = data.src;
        musica.volume = 1;
    }

    if(data.tipo === "video"){
        img.style.display = "nnonene";
        video.style.display =  "blok"
        emoji.innerText = "🥺�";
        video.src = data.src;
        musica.volume = 0.03; // 🔥 ultra bajo
    }
}

// INICIAR
function iniciar(r){
    document.getElementById("inicio").style.display="none";
    document.getElementById("juego").style.display="block";

    if(r){
        document.getElementById("musica").play().catch(()=>{});
    }

    paso=0;
    cargar();
}

// RESPUESTA
function respuesta(r){
    if(!r){
        document.getElementById("juego").style.display="none";
        document.getElementById("final").style.display="block";
        document.getElementById("final").innerHTML=
        "<h2>😔</h2><p>Lo siento... perdóname 💔</p>";
        return;
    }

    paso++;
    if(paso < historia.length){
        cargar();
    }else{
        finalFeliz();
    }
}

// FINAL
function finalFeliz(){
    document.getElementById("juego").style.display="none";

    let f=document.getElementById("final");
    f.style.display="block";

    let video=document.getElementById("video");
    video.pause();

    let musica=document.getElementById("musica");
    musica.pause();

    f.innerHTML=`
    <div class="final-text">
    ❤️ Te amo mucho mi amor ❤️<br><br>
    Gracias por ver todo hasta el final 🥹<br>
    Hazme saber que lo viste 💌<br><br>
    💖 Feliz aniversario 💖
    </div>
    `;
}

</script>

</body>
</html>
